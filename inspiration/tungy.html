<script>
        // Micro-interaction: Update progress bar on load
        window.addEventListener('DOMContentLoaded', () => {
            const bar = document.querySelector('.bg-tertiary-container');
            if(bar) {
                bar.style.width = '0%';
                setTimeout(() => {
                    bar.style.width = '90%';
                }, 300);
            }
        });

        // Click effects for app items
        document.querySelectorAll('.block-shadow-white').forEach(card => {
            card.addEventListener('mousedown', () => {
                card.style.transform = 'translateY(2px)';
                card.style.boxShadow = '0 2px 0 0 #E2E8F0';
            });
            card.addEventListener('mouseup', () => {
                card.style.transform = 'translateY(0)';
                card.style.boxShadow = '0 4px 0 0 #E2E8F0';
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'translateY(0)';
                card.style.boxShadow = '0 4px 0 0 #E2E8F0';
            });
        });
    </script>
